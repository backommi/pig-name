<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>小猪养成记</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
            overflow: hidden;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
        }
        
        .game-container {
            max-width: 480px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 8px;
        }
        
        /* 顶部状态栏 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 8px 12px;
            margin-bottom: 6px;
            font-size: 14px;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 4px;
            color: #fff;
        }
        
        .coins { color: #FFD700; font-weight: bold; }
        
        /* 小猪区域 - 占据主要空间 */
        .pig-section {
            flex: 1;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 6px;
            min-height: 0;
        }
        
        .pig-stage {
            position: absolute;
            top: 8px;
            right: 12px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: #fff;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .pig-avatar {
            width: 120px;
            height: 120px;
            animation: breathe 2s infinite;
            cursor: pointer;
            transition: transform 0.1s;
        }
        
        .pig-avatar:active {
            transform: scale(0.95);
        }
        
        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        /* 猪脸 SVG 样式 */
        .pig-face {
            width: 100%;
            height: 100%;
        }
        
        /* 猪的信息 */
        .pig-info {
            display: flex;
            gap: 20px;
            margin-top: 8px;
            color: #fff;
            font-size: 14px;
        }
        
        .pig-info span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        /* 进度条 */
        .progress-bar {
            width: 80%;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            margin-top: 8px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #11998e, #38ef7d);
            border-radius: 3px;
            transition: width 0.3s;
        }
        
        /* 操作按钮区 */
        .actions {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 6px;
        }
        
        .action-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 12px;
            padding: 10px;
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        
        .action-btn:active {
            transform: scale(0.95);
            background: rgba(255,255,255,0.3);
        }
        
        .action-btn .icon {
            font-size: 24px;
        }
        
        .action-btn.feed { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        .action-btn.play { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .action-btn.clean { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
        
        /* 日志区 */
        .log-area {
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            padding: 8px 12px;
            color: #fff;
            font-size: 12px;
            height: 60px;
            overflow-y: auto;
        }
        
        .log-item {
            margin-bottom: 2px;
            opacity: 0.9;
        }
        
        .log-item:last-child {
            opacity: 1;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- 状态栏 -->
        <div class="status-bar">
            <div class="status-item">
                <span>📅</span>
                <span id="week">第1周</span>
            </div>
            <div class="status-item coins">
                <span>💰</span>
                <span id="coins">2000</span>
            </div>
        </div>
        
        <!-- 小猪区域 -->
        <div class="pig-section">
            <div class="pig-stage" id="stage">乳猪</div>
            <div class="pig-avatar" id="pig">
                <svg class="pig-face" viewBox="0 0 120 120" id="pigSvg">
                    <!-- 猪脸背景 -->
                    <circle cx="60" cy="60" r="55" fill="#FFB6C1" stroke="#FF69B4" stroke-width="3"/>
                    <!-- 猪鼻子 -->
                    <ellipse cx="60" cy="70" rx="25" ry="18" fill="#FF69B4"/>
                    <circle cx="52" cy="70" r="5" fill="#8B4513"/>
                    <circle cx="68" cy="70" r="5" fill="#8B4513"/>
                    <!-- 眼睛 -->
                    <circle cx="40" cy="45" r="8" fill="#333"/>
                    <circle cx="42" cy="43" r="3" fill="#fff"/>
                    <circle cx="80" cy="45" r="8" fill="#333"/>
                    <circle cx="82" cy="43" r="3" fill="#fff"/>
                    <!-- 耳朵 -->
                    <ellipse cx="25" cy="30" rx="12" ry="18" fill="#FFB6C1" stroke="#FF69B4" stroke-width="2" transform="rotate(-20 25 30)"/>
                    <ellipse cx="95" cy="30" rx="12" ry="18" fill="#FFB6C1" stroke="#FF69B4" stroke-width="2" transform="rotate(20 95 30)"/>
                    <!-- 腮红 -->
                    <ellipse cx="25" cy="65" rx="10" ry="6" fill="#FF69B4" opacity="0.5"/>
                    <ellipse cx="95" cy="65" rx="10" ry="6" fill="#FF69B4" opacity="0.5"/>
                    <!-- 嘴巴 -->
                    <path d="M 50 85 Q 60 92 70 85" stroke="#8B4513" stroke-width="2" fill="none"/>
                </svg>
            </div>
            <div class="pig-info">
                <span>⚖️ <span id="weight">5.0</span>kg</span>
                <span>❤️ <span id="health">100</span>%</span>
                <span>😊 <span id="mood">80</span>%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="growth" style="width: 5%"></div>
            </div>
        </div>
        
        <!-- 操作按钮 -->
        <div class="actions">
            <button class="action-btn feed" onclick="feed()">
                <span class="icon">🌽</span>
                <span>喂食 (-50)</span>
            </button>
            <button class="action-btn play" onclick="play()">
                <span class="icon">🎾</span>
                <span>玩耍</span>
            </button>
            <button class="action-btn clean" onclick="clean()">
                <span class="icon">🧹</span>
                <span>打扫</span>
            </button>
        </div>
        
        <!-- 日志 -->
        <div class="log-area" id="log">
            <div class="log-item">欢迎来到小猪养成记！</div>
            <div class="log-item">点击按钮照顾你的小猪吧~</div>
        </div>
    </div>

    <script>
        // 游戏状态
        const state = {
            week: 1,
            coins: 2000,
            weight: 5.0,
            health: 100,
            mood: 80,
            growth: 5, // 成长进度 0-100
            stage: 0 // 0:乳猪 1:小猪 2:中猪 3:大猪 4:肥猪
        };
        
        // 猪的阶段配置 - 5个等级，使用不同颜色的猪脸
        const stages = [
            { name: '猪崽', color: '#FFE4E1', noseColor: '#FFB6C1', size: 0.7 },  // 浅粉色，小只
            { name: '小猪', color: '#FFB6C1', noseColor: '#FF69B4', size: 0.85 }, // 粉红色，中等
            { name: '中猪', color: '#FF69B4', noseColor: '#FF1493', size: 1.0 },  // 深粉色，标准
            { name: '肥猪', color: '#FF1493', noseColor: '#C71585', size: 1.15 }, // 玫红色，肥硕
            { name: '出栏', color: '#FFD700', noseColor: '#FFA500', size: 1.2 }   // 金黄色，可以卖
        ];
        
        // 更新显示
        function updateUI() {
            document.getElementById('week').textContent = `第${state.week}周`;
            document.getElementById('coins').textContent = state.coins;
            document.getElementById('weight').textContent = state.weight.toFixed(1);
            document.getElementById('health').textContent = state.health;
            document.getElementById('mood').textContent = state.mood;
            document.getElementById('growth').style.width = state.growth + '%';
            
            // 更新阶段
            const stage = stages[state.stage];
            document.getElementById('stage').textContent = stage.name;
            
            // 更新猪脸颜色和大小
            const pigSvg = document.getElementById('pigSvg');
            const faceCircle = pigSvg.querySelector('circle');
            const nose = pigSvg.querySelector('ellipse');
            
            faceCircle.setAttribute('fill', stage.color);
            nose.setAttribute('fill', stage.noseColor);
            pigSvg.style.transform = `scale(${stage.size})`;
        }
        
        // 添加日志
        function log(msg) {
            const logArea = document.getElementById('log');
            const item = document.createElement('div');
            item.className = 'log-item';
            item.textContent = msg;
            logArea.appendChild(item);
            logArea.scrollTop = logArea.scrollHeight;
            
            // 保持最多5条日志
            while (logArea.children.length > 5) {
                logArea.removeChild(logArea.firstChild);
            }
        }
        
        // 喂食
        function feed() {
            if (state.coins < 50) {
                log('金币不足！');
                return;
            }
            state.coins -= 50;
            state.weight += 2;
            state.health = Math.min(100, state.health + 5);
            state.growth = Math.min(100, state.growth + 8);
            
            checkStage();
            updateUI();
            log('喂食成功！小猪长胖了~');
            
            // 动画效果
            const pigSvg = document.getElementById('pigSvg');
            const currentScale = stages[state.stage].size;
            pigSvg.style.transform = `scale(${currentScale * 1.15})`;
            setTimeout(() => {
                pigSvg.style.transform = `scale(${currentScale})`;
            }, 200);
        }
        
        // 玩耍
        function play() {
            state.mood = Math.min(100, state.mood + 15);
            state.health = Math.max(0, state.health - 2);
            updateUI();
            log('小猪玩得很开心！');
        }
        
        // 打扫
        function clean() {
            state.health = Math.min(100, state.health + 10);
            updateUI();
            log('猪圈变干净了！');
        }
        
        // 检查阶段升级
        function checkStage() {
            const newStage = Math.min(4, Math.floor(state.weight / 45));
            if (newStage > state.stage) {
                state.stage = newStage;
                log(`恭喜！小猪成长为${stages[newStage].name}了！`);
            }
        }
        
        // 每周自动增长
        setInterval(() => {
            state.week++;
            state.weight += 0.5;
            state.mood = Math.max(0, state.mood - 5);
            state.growth = Math.min(100, state.growth + 2);
            checkStage();
            updateUI();
            log(`第${state.week}周了，小猪又长大了一点`);
        }, 30000); // 30秒模拟一周
        
        // 初始化
        updateUI();
    </script>
</body>
</html>
